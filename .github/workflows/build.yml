name: Build Pupilómetro APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # permite ejecutar manualmente desde la UI de GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: ☕ Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 🔧 Dar permisos a gradlew
        run: chmod +x gradlew

      - name: 📦 Cache de Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 🏗️ Compilar APK Debug
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: 📤 Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: Pupilometro-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
